name: 每日信号扫描

on:
  # 定时触发：每个交易日 15:35 北京时间
  schedule:
    - cron: '35 7 * * 1-5'  # UTC 7:35 = 北京时间 15:35
  # 允许手动触发（测试用）
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 运行信号扫描
        run: |
          python signal_notifier.py

      - name: 上传信号文件（保留 30 天）
        uses: actions/upload-artifact@v4
        with:
          name: signal-report-${{ github.run_date }}
          path: signals_*.txt
          retention-days: 30

      - name: 推送到微信（可选，需要配置 Secret）
        if: always()
        env:
          SENDKEY: ${{ secrets.serverchan_sendkey1 }}
        run: |
          if [ -z "$SENDKEY" ]; then
            echo "未配置 SERVERCHAN_SENDKEY，跳过微信推送"
            exit 0
          fi
          # 找今天生成的信号文件
          SIGNAL_FILE=$(ls -t signals_*.txt 2>/dev/null | head -1)
          if [ -z "$SIGNAL_FILE" ]; then
            TITLE="信号扫描失败"
            CONTENT="未生成信号文件，请检查 GitHub Actions 日志"
          else
            TITLE="📊 今日量化信号 $(date +%Y-%m-%d)"
            CONTENT=$(cat "$SIGNAL_FILE")
          fi
          # 调用 Server酱 API
          curl -s -X POST "https://sctapi.ftqq.com/${SENDKEY}.send" \
            -d "title=${TITLE}" \
            --data-urlencode "desp=${CONTENT}"
