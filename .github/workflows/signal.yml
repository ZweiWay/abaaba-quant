name: 每日信号扫描

on:
  schedule:
    - cron: '35 7 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    # ⬇️ 关键：环境变量在这里注入 ⬇️
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY_1 }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 调试：检查 Secret 是否配置
        run: |
          echo "TUSHARE_TOKEN 长度: ${#TUSHARE_TOKEN}"
          echo "SERVERCHAN_SENDKEY 长度: ${#SERVERCHAN_SENDKEY}"

      - name: 运行信号扫描
        run: |
          python signal_notifier.py

      - name: 上传信号文件
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signal-report-${{ github.run_date }}
          path: signals_*.txt
          retention-days: 30
          if-no-files-found: warn

      - name: 推送到微信
        if: always()
        env:
          SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY_1 }}
        run: |
          if [ -z "$SENDKEY" ]; then
            echo "未配置 SENDKEY，跳过推送"
            exit 0
          fi
          SIGNAL_FILE=$(ls -t signals_*.txt 2>/dev/null | head -1)
          if [ -z "$SIGNAL_FILE" ]; then
            TITLE="⚠️ 信号扫描失败"
            CONTENT="未生成信号文件，请检查日志"
          else
            TITLE="📊 今日量化信号 $(date +%Y-%m-%d)"
            CONTENT=$(cat "$SIGNAL_FILE")
          fi
          curl -s -X POST "https://sctapi.ftqq.com/${SENDKEY}.send" \
            -d "title=${TITLE}" \
            --data-urlencode "desp=${CONTENT}"
